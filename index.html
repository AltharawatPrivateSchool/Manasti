            addDynamicQuestionBlock(qData = null, forcedIdx = null) {
                const container = document.getElementById('dynamic-questions-builder');
                if (!container) return;
                
                const qIndex = forcedIdx !== null ? forcedIdx : container.children.length;
                const qNum = qIndex + 1;

                const qBlock = document.createElement('div');
                qBlock.className = 'dynamic-question-block';
                qBlock.setAttribute('data-q-index', qIndex);
                qBlock.style = 'border: 1px solid var(--border-color); padding: 15px; border-radius: var(--radius-md); margin-bottom: 15px; background-color: var(--bg-light);';

                let qText = qData ? qData.text : '';
                let qPoints = qData ? qData.points : 10;
                let qImg = qData ? qData.image : '';

                let optionsHTML = '';
                if (qData && qData.options) {
                    qData.options.forEach((opt, oIdx) => {
                        const isCorrect = opt === qData.correct;
                        optionsHTML += `
                            <div class="option-row" style="display:flex; gap:8px; margin-bottom:8px;">
                                <input type="text" class="form-control opt-value-input" placeholder="خيار الإجابة" value="${opt}" required>
                                <input type="radio" name="correct_radio_${qIndex}" class="correct-radio" style="width:18px; accent-color:var(--primary-blue);" ${isCorrect ? 'checked' : ''}>
                            </div>
                        `;
                    });
                } else {
                    optionsHTML = `
                        <div class="option-row" style="display:flex; gap:8px; margin-bottom:8px;">
                            <input type="text" class="form-control opt-value-input" placeholder="الخيار الأول" required>
                            <input type="radio" name="correct_radio_${qIndex}" class="correct-radio" style="width:18px; accent-color:var(--primary-blue);" checked>
                        </div>
                        <div class="option-row" style="display:flex; gap:8px; margin-bottom:8px;">
                            <input type="text" class="form-control opt-value-input" placeholder="الخيار الثاني" required>
                            <input type="radio" name="correct_radio_${qIndex}" class="correct-radio" style="width:18px; accent-color:var(--primary-blue);">
                        </div>
                    `;
                }

                qBlock.innerHTML = `
                    <div class="form-group" style="margin-bottom:12px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                            <label style="margin:0; font-size:0.8rem;">السؤال ${qNum}</label>
                            <button type="button" class="btn btn-secondary" style="width:auto; padding:2px 6px; font-size:0.7rem;" onclick="this.parentElement.parentElement.parentElement.remove()">حذف</button>
                        </div>
                        <input type="text" class="form-control q-text-input" placeholder="مثال: ما حاصل ضرب القيمة؟" value="${qText}" required>
                    </div>
                    <div class="form-group">
                        <label>إرفاق صورة توضيحية للسؤال (اختياري)</label>
                        <input type="file" accept="image/*" class="form-control" onchange="App.handleQuestionImage(this, ${qIndex})">
                        <div id="q-img-preview-box-${qIndex}" style="margin-top:10px; display:${qImg ? 'block' : 'none'};">
                            <img id="q-img-preview-tag-${qIndex}" src="${qImg}" style="max-height:140px; border-radius:var(--radius-md); border:1px solid var(--border-color);">
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom:12px;">
                        <label>الدرجة المخصصة للسؤال</label>
                        <input type="number" class="form-control q-points-input" value="${qPoints}" min="1" required style="max-width:120px;">
                    </div>
                    <div class="options-container" id="opts-container-${qIndex}">
                        <label style="font-weight:700; font-size:0.8rem; display:block; margin-bottom:6px;">الخيارات المتاحة للاختبار:</label>
                        ${optionsHTML}
                    </div>
                    <button type="button" class="btn btn-secondary" style="width:auto; padding:4px 8px; font-size:0.75rem; margin-top:5px;" onclick="App.addOptionToQuestion(${qIndex})">
                        <i class="fa-solid fa-plus-circle"></i> إضافة خيار آخر
                    </button>
                `;
                container.appendChild(qBlock);
                if (qImg) {
                    this.tempQuestionImages[qIndex] = qImg;
                }
            },

            handleQuestionImage(input, index) {
                const file = input.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const base64Data = e.target.result;
                        this.tempQuestionImages[index] = base64Data;
                        const previewBox = document.getElementById(`q-img-preview-box-${index}`);
                        const previewTag = document.getElementById(`q-img-preview-tag-${index}`);
                        if (previewBox && previewTag) {
                            previewTag.src = base64Data;
                            previewBox.style.display = 'block';
                        }
                    };
                    reader.readAsDataURL(file);
                }
            },

            addOptionToQuestion(qIndex) {
                const container = document.getElementById(`opts-container-${qIndex}`);
                if (!container) return;
                const optRow = document.createElement('div');
                optRow.className = 'option-row';
                optRow.style = 'display:flex; gap:8px; margin-bottom:8px; align-items:center;';
                optRow.innerHTML = `
                    <input type="text" class="form-control opt-value-input" placeholder="خيار إضافي" required>
                    <input type="radio" name="correct_radio_${qIndex}" class="correct-radio" style="width:18px; accent-color:var(--primary-blue);">
                    <button type="button" class="btn btn-secondary" style="width:auto; padding:5px; font-size:0.75rem;" onclick="this.parentElement.remove()"><i class="fa-solid fa-trash"></i></button>
                `;
                container.appendChild(optRow);
            },

            async saveDynamicAssignment(assignId) {
                const title = document.getElementById('assign-title').value.trim();
                const duration = parseInt(document.getElementById('assign-duration').value) || 10;
                const grade = document.getElementById('assign-grade').value;

                if (!title) {
                    this.showToast('يرجى تحديد عنوان الاختبار الدراسي.', 'danger');
                    return;
                }

                const blocks = document.querySelectorAll('.dynamic-question-block');
                const questions = [];

                blocks.forEach((block, qIdx) => {
                    const text = block.querySelector('.q-text-input').value.trim();
                    const points = parseInt(block.querySelector('.q-points-input').value) || 10;
                    const optRows = block.querySelectorAll('.option-row');
                    const imgData = this.tempQuestionImages[qIdx] || '';
                    
                    const options = [];
                    let correctValue = '';

                    optRows.forEach(row => {
                        const val = row.querySelector('.opt-value-input').value.trim();
                        const isCorrect = row.querySelector('.correct-radio').checked;
                        if (val) {
                            options.push(val);
                            if (isCorrect) {
                                correctValue = val;
                            }
                        }
                    });

                    if (text && options.length > 1 && correctValue) {
                        questions.push({
                            qId: qIdx + 1,
                            text,
                            options,
                            correct: correctValue,
                            points,
                            image: imgData
                        });
                    }
                });

                if (questions.length === 0) {
                    this.showToast('يرجى إضافة سؤال واحد على الأقل يحتوي على الخيارات المناسبة.', 'danger');
                    return;
                }

                const teacher = AppState.getCurrentUser();
                const assigns = await DBService.get('assignments');

                if (assignId && assignId !== 'null') {
                    const idx = assigns.findIndex(a => a.id === assignId);
                    if (idx !== -1) {
                        assigns[idx].title = title;
                        assigns[idx].duration = duration;
                        assigns[idx].grade = grade;
                        assigns[idx].questions = questions;
                    }
                } else {
                    assigns.push({
                        id: 'assign_' + Date.now(),
                        title,
                        duration,
                        grade,
                        questions,
                        teacherId: teacher.id
                    });
                }

                await DBService.set('assignments', assigns);
                this.closeModal('generic-modal');
                this.showToast('تم نشر وحفظ الاختبار الدراسي التفاعلي بنجاح.', 'success');
                this.renderTeacherAssignments(document.getElementById('app-rendered-view'));
            },

            async deleteAssignment(id) {
                let assigns = await DBService.get('assignments');
                assigns = assigns.filter(a => a.id !== id);
                await DBService.set('assignments', assigns);
                this.showToast('تم حذف التقييم المختار.', 'warning');
                this.renderTeacherAssignments(document.getElementById('app-rendered-view'));
            },

            // تصحيح ورصد الدرجات لطلاب المعلم
            async renderTeacherGrading(view) {
                const teacher = AppState.getCurrentUser();
                const subs = await DBService.get('submissions') || [];
                
                const students = (await DBService.get('users')).filter(u => u.role === 'student' && u.teacherId === teacher.id);
                const assigns = (await DBService.get('assignments')).filter(a => a.teacherId === teacher.id);

                let rows = '';
                subs.forEach(s => {
                    const student = students.find(u => u.id === s.studentId);
                    const assign = assigns.find(u => u.id === s.assignmentId);

                    if (student && assign) {
                        rows += `
                            <tr>
                                <td><strong>${student.name}</strong></td>
                                <td>${assign.title}</td>
                                <td><span class="badge ${s.graded ? 'badge-success' : 'badge-warning'}">${s.graded ? s.score + '%' : 'بانتظار الرصد'}</span></td>
                                <td>
                                    <button class="btn" style="width:auto; padding:6px 12px; font-size:0.8rem;" onclick="App.openGradeSubmissionModal('${s.id}')">رصد / تعديل الدرجة</button>
                                </td>
                            </tr>
                        `;
                    }
                });

                view.innerHTML = `
                    <div class="data-table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>اسم الطالب</th>
                                    <th>اسم الواجب</th>
                                    <th>الدرجة المرصودة</th>
                                    <th>التحكم ورصد النتيجة</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows || '<tr><td colspan="4" style="text-align:center;">لا توجد أي إجابات تم حلها بعد من قبل طلابك.</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                `;
            },

            async openGradeSubmissionModal(subId) {
                const subs = await DBService.get('submissions');
                const sub = subs.find(s => s.id === subId);
                const student = (await DBService.get('users')).find(u => u.id === sub.studentId);

                const body = document.getElementById('generic-modal-body');
                const footer = document.getElementById('generic-modal-footer');
                if (!body || !footer) return;
                document.getElementById('generic-modal-title').textContent = `رصد درجة الطالب: ${student.name}`;

                body.innerHTML = `
                    <div class="form-group">
                        <label>الدرجة المكتسبة (%)</label>
                        <input type="number" id="grade-score" class="form-control" value="${sub.score || ''}" min="0" max="100">
                    </div>
                    <div class="form-group">
                        <label>ملاحظات وتوجيهات المعلم</label>
                        <textarea id="grade-feedback" class="form-control" rows="3" placeholder="ملاحظات تشجيعية...">${sub.feedback || ''}</textarea>
                    </div>
                `;

                footer.innerHTML = `
                    <button class="btn btn-secondary" onclick="App.closeModal('generic-modal')">إلغاء</button>
                    <button class="btn" onclick="App.submitGrading('${sub.id}')">رصد الدرجة الآن</button>
                `;

                this.openModal('generic-modal');
            },

            async submitGrading(subId) {
                const score = parseInt(document.getElementById('grade-score').value);
                const feedback = document.getElementById('grade-feedback').value.trim();

                if (isNaN(score) || score < 0 || score > 100) {
                    this.showToast('يرجى رصد درجة صحيحة مابين 0 و 100.', 'danger');
                    return;
                }

                const subs = await DBService.get('submissions');
                const sub = subs.find(s => s.id === subId);
                sub.score = score;
                sub.feedback = feedback;
                sub.graded = true;

                await DBService.set('submissions', subs);

                const notifs = await DBService.get('notifications') || [];
                notifs.push({
                    id: 'not_' + Date.now(),
                    userId: sub.studentId,
                    text: `تم رصد نتيجتك بنجاح! النتيجة النهائية: ${score}%`,
                    read: false
                });
                await DBService.set('notifications', notifs);

                this.closeModal('generic-modal');
                this.showToast('تم رصد الدرجة بنجاح وإرسال الإخطار لطلابك.', 'success');
                this.renderTeacherGrading(document.getElementById('app-rendered-view'));
            },

            // صندوق المراسلات والرسائل (Inbox) لجميع الأطراف المربوطة
            async renderTeacherMessages(view) {
                const teacher = AppState.getCurrentUser();
                const users = await DBService.get('users');
                
                const chatableUsers = users.filter(u => u.id !== teacher.id && u.teacherId === teacher.id && u.status === 'approved');

                let userCardsHTML = '';
                chatableUsers.forEach(u => {
                    const isActive = this.activeChatUserId === u.id ? 'active' : '';
                    const roleText = u.role === 'student' ? 'طالب' : 'ولي أمر';
                    userCardsHTML += `
                        <div class="inbox-user-card ${isActive}" onclick="App.selectInboxUser('${u.id}', '${u.name}')">
                            <div class="inbox-user-avatar">${u.name.substring(0, 1)}</div>
                            <div class="inbox-user-info">
                                <div class="inbox-user-name">${u.name}</div>
                                <div class="inbox-user-role">${roleText}</div>
                            </div>
                        </div>
                    `;
                });

                view.innerHTML = `
                    <div class="inbox-layout">
                        <div class="inbox-sidebar">
                            <div class="inbox-sidebar-header"><i class="fa-solid fa-address-book"></i> قائمتك التعليمية</div>
                            <div class="inbox-user-list">
                                ${userCardsHTML || '<div style="text-align:center; padding:20px; font-size:0.8rem; color:var(--text-muted);">لا يوجد جهات اتصال نشطة تحت إشرافك حالياً.</div>'}
                            </div>
                        </div>
                        <div class="inbox-chat-area" id="inbox-chat-container">
                            <div class="inbox-chat-placeholder">
                                <i class="fa-solid fa-comments"></i>
                                <span>الرجاء تحديد جهة اتصال لبدء الدردشة الآمنة الفورية</span>
                            </div>
                        </div>
                    </div>
                `;

                if (this.activeChatUserId) {
                    const activeUser = users.find(u => u.id === this.activeChatUserId);
                    if (activeUser) {
                        this.selectInboxUser(activeUser.id, activeUser.name);
                    }
                }
            },

            async selectInboxUser(userId, name) {
                this.activeChatUserId = userId;
                const container = document.getElementById('inbox-chat-container');
                if (!container) return;

                document.querySelectorAll('.inbox-user-card').forEach(el => el.classList.remove('active'));
                
                const myUser = AppState.getCurrentUser();
                const allMsgs = await DBService.get('messages') || [];
                const conversations = allMsgs.filter(m => 
                    (m.senderId === myUser.id && m.receiverId === userId) || 
                    (m.senderId === userId && m.receiverId === myUser.id)
                );

                let msgsHTML = '';
                conversations.forEach(m => {
                    const isMe = m.senderId === myUser.id;
                    msgsHTML += `
                        <div class="chat-bubble ${isMe ? 'sent' : 'received'}">
                            <p>${m.text}</p>
                            <small style="font-size:0.65rem; opacity:0.8; display:block; text-align:left; margin-top:4px;">${m.timestamp || ''}</small>
                        </div>
                    `;
                });

                container.innerHTML = `
                    <div style="padding:15px; border-bottom:1px solid var(--border-color); font-weight:bold; font-size:0.95rem; display:flex; align-items:center; gap:8px; background-color: var(--bg-light);">
                        <i class="fa-solid fa-circle-user" style="color:var(--primary-blue); font-size:1.2rem;"></i> ${name}
                    </div>
                    <div class="chat-history" id="chat-history-box" style="flex:1;">
                        ${msgsHTML || '<p style="color:var(--text-muted); text-align:center; margin-top:100px; font-size:0.85rem;">لم تبدأ المراسلة بعد، اكتب رسالتك الأولى بالأسفل.</p>'}
                    </div>
                    <div class="chat-bar">
                        <input type="text" id="chat-input-field" class="chat-input" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key === 'Enter') App.sendInboxMessage('${myUser.id}', '${userId}', '${name}')">
                        <button class="chat-btn" onclick="App.sendInboxMessage('${myUser.id}', '${userId}', '${name}')">إرسال</button>
                    </div>
                `;

                setTimeout(() => {
                    const box = document.getElementById('chat-history-box');
                    if (box) box.scrollTop = box.scrollHeight;
                }, 50);

            async sendInboxMessage(myId, recipientId, recipientName) {

            // محاكي وبيئة الاختبار التفاعلية للطلاب
            async startInteractiveExamMode(assignId) {
                const assigns = await DBService.get('assignments');
                const assign = assigns.find(a => a.id === assignId);
                if (!assign) return;

                const container = document.getElementById('student-assignments-container');
                if (!container) return;

                let currentQIndex = 0;
                let answers = {};
                let timeLeft = assign.duration * 60;

                const renderQuestion = () => {
                    const q = assign.questions[currentQIndex];
                    let imgHTML = q.image ? `<div style="margin-bottom:15px; text-align:center;"><img src="${q.image}" style="max-height:180px; border-radius:var(--radius-md); border:1px solid var(--border-color);"></div>` : '';

                    let optionsHTML = '';
                    q.options.forEach((opt, idx) => {
                        const isSelected = answers[currentQIndex] === opt;
                        optionsHTML += `
                            <label class="exam-option-label ${isSelected ? 'selected-option' : ''}">
                                <input type="radio" name="exam_q_opt" value="${opt}" ${isSelected ? 'checked' : ''} onchange="App.saveExamAnswer(${currentQIndex}, '${opt}')">
                                <span>${opt}</span>
                            </label>
                        `;
                    });

                    container.innerHTML = `
                        <div class="exam-mode-card">
                            <div class="exam-header">
                                <h3 style="font-weight:800; font-size:1.15rem; color:var(--primary-blue);"><i class="fa-solid fa-file-signature"></i> ${assign.title}</h3>
                                <div class="exam-timer" id="exam-timer-display"><i class="fa-solid fa-hourglass-half"></i> 00:00</div>
                                <span class="exam-progress">السؤال ${currentQIndex + 1} من ${assign.questions.length}</span>
                            </div>
                            <div class="exam-question-box">
                                ${imgHTML}
                                <div class="exam-question-text">${q.text}</div>
                                <div class="exam-options-grid">${optionsHTML}</div>
                            </div>
                            <div class="exam-footer">
                                <button class="btn btn-secondary" onclick="App.prevExamQuestion()" ${currentQIndex === 0 ? 'disabled' : ''}>السابق</button>
                                ${currentQIndex === assign.questions.length - 1 
                                    ? `<button class="btn" style="background-color:var(--success);" onclick="App.submitExamSubmission('${assign.id}')">تسجيل وإرسال الإجابات</button>` 
                                    : `<button class="btn" onclick="App.nextExamQuestion()">التالي</button>`}
                            </div>
                        </div>
                    `;
                };

                App.saveExamAnswer = (idx, value) => {
                    answers[idx] = value;
                    const labels = document.querySelectorAll('.exam-option-label');
                    labels.forEach(l => l.classList.remove('selected-option'));
                    const selectedInput = document.querySelector(`input[value="${value}"]`);
                    if (selectedInput) {
                        selectedInput.parentElement.classList.add('selected-option');
                    }
                };

                App.nextExamQuestion = () => {
                    if (currentQIndex < assign.questions.length - 1) {
                        currentQIndex++;
                        renderQuestion();
                    }
                };

                App.prevExamQuestion = () => {
                    if (currentQIndex > 0) {
                        currentQIndex--;
                        renderQuestion();
                    }
                };

                App.submitExamSubmission = async (aId) => {
                    clearInterval(App.examTimerInterval);
                    
                    let correctCount = 0;
                    let totalPoints = 0;
                    assign.questions.forEach((q, idx) => {
                        totalPoints += q.points;
                        if (answers[idx] === q.correct) {
                            correctCount += q.points;
                        }
                    });

                    let finalScorePercentage = totalPoints > 0 ? Math.round((correctCount / totalPoints) * 100) : 0;
                    const student = AppState.getCurrentUser();

                    const subs = await DBService.get('submissions') || [];
                    subs.push({
                        id: 'sub_' + Date.now(),
                        assignmentId: aId,
                        studentId: student.id,
                        score: finalScorePercentage,
                        graded: true,
                        feedback: 'تصحيح تلقائي من النظام بنجاح'
                    });

                    await DBService.set('submissions', subs);
                    App.showToast('تم إرسال وحفظ نتيجتك التفاعلية بالمنصة.', 'success');
                    App.navigateTo('assignments');
                };

                // محاكي الميقاتي التنازلي التلقائي
                const startTimer = () => {
                    App.examTimerInterval = setInterval(() => {
                        let mins = Math.floor(timeLeft / 60);
                        let secs = timeLeft % 60;
                        const display = document.getElementById('exam-timer-display');
                        if (display) {
                            display.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                        }
                        
                        if (timeLeft <= 0) {
                            clearInterval(App.examTimerInterval);
                            App.showToast('انتهى الوقت المحدد للاختبار! سيتم تسليم إجابتك تلقائياً.', 'danger');
                            App.submitExamSubmission(assign.id);
                        }
                        timeLeft--;
                    }, 1000);
                };

                renderQuestion();
                startTimer();
            },

                    id: 'msg_' + Date.now(),
                    senderId: myId,
                    recipientId: recipientId,
                    receiverId: recipientId,
                    text,
                    timestamp: timeString
                });

                await DBService.set('messages', allMsgs);
                input.value = '';
                this.renderActiveView();
                this.showToast('تم إرسال الرسالة بنجاح.', 'success');
            },


            // ==========================================
            // 10. محرك الرسم البياني النقي (Canvas Engine)
            // ==========================================

            drawCanvasChart(canvasId, labels, dataPoints, color) {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;

                const wrapper = canvas.parentElement;
                if (!wrapper) return;
                canvas.width = wrapper.clientWidth || 600;

                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;
                ctx.clearRect(0, 0, width, height);

                const padding = 40;
                const chartHeight = height - padding * 2;
                const chartWidth = width - padding * 2;

                ctx.strokeStyle = '#F1F5F9';
                ctx.lineWidth = 1;
                for (let i = 0; i <= 4; i++) {
                    const y = padding + (chartHeight * i) / 4;
                    ctx.beginPath();
                    ctx.moveTo(padding, y);
                    ctx.lineTo(width - padding, y);
                    ctx.stroke();
                }

                ctx.strokeStyle = '#cbd5e1';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(padding, padding);
                ctx.lineTo(padding, height - padding);
                ctx.lineTo(width - padding, height - padding);
                ctx.stroke();

                if (dataPoints.length === 0) return;
                const maxVal = Math.max(...dataPoints, 100);
                const xStep = chartWidth / (dataPoints.length - 1 || 1);

                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.beginPath();

                dataPoints.forEach((val, index) => {
                    const x = padding + index * xStep;
                    const y = height - padding - (val / maxVal) * chartHeight;
                    if (index === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                });
                ctx.stroke();

                dataPoints.forEach((val, index) => {
                    const x = padding + index * xStep;
                    const y = height - padding - (val / maxVal) * chartHeight;

                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(x, y, 6, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#0F172A';
                    ctx.font = 'bold 11px IBM Plex Sans Arabic, Tajawal';
                    ctx.fillText(`${val}`, x - 8, y - 10);

                    if (labels[index]) {
                        ctx.fillStyle = '#475569';
                        ctx.font = '10px IBM Plex Sans Arabic, Tajawal';
                        ctx.fillText(labels[index], x - 18, height - padding + 22);
                    }
                });
            },

            async openNotificationsModal() {
                const container = document.getElementById('notifications-list-container');
                if (!container) return;
                container.innerHTML = '';

                const user = AppState.getCurrentUser();
                const anns = await DBService.get('announcements') || [];
                const notifs = await DBService.get('notifications') || [];
                
                const myTeacherId = user.role === 'teacher' ? user.id : user.teacherId;
                const myAnns = anns.filter(a => a.teacherId === myTeacherId);
                const myNotifs = notifs.filter(n => n.userId === user.id);

                if (myAnns.length === 0 && myNotifs.length === 0) {
                    container.innerHTML = '<p style="color:var(--text-muted); text-align:center; font-size:0.85rem; padding:15px;">لا توجد أي تنبيهات واردة حالياً.</p>';
                } else {
                    if (myAnns.length > 0) {
                        container.innerHTML += '<h4 style="margin-bottom:10px; color:var(--primary-blue); font-size:0.9rem;">إعلانات وتوجيهات الإدارة والمعلمين:</h4>';
                        myAnns.forEach(a => {
                            container.innerHTML += `
                                <div style="padding:12px; border:1px solid var(--border-color); border-radius:var(--radius-md); margin-bottom:10px; background-color:var(--primary-blue-light);">
                                    <p style="font-weight:700; font-size:0.85rem; color:var(--text-dark);">${a.text}</p>
                                    <small style="color:var(--text-muted); display:block; margin-top:5px;"><i class="fa-solid fa-clock"></i> التاريخ: ${a.date}</small>
                                </div>
                            `;
                        });
                    }

                    if (myNotifs.length > 0) {
                        container.innerHTML += '<h4 style="margin-top:15px; margin-bottom:10px; color:var(--success); font-size:0.9rem;">إشعارات نظامك الخاصة:</h4>';
                        myNotifs.forEach(n => {
                            container.innerHTML += `
                                <div style="padding:10px; border:1px solid var(--border-color); border-radius:var(--radius-md); margin-bottom:8px; background-color: var(--bg-light);">
                                    <p style="font-size:0.85rem; color:var(--text-dark);">${n.text}</p>
                                </div>
                            `;
                        });
                    }
                }
                this.openModal('notifications-modal');
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            App.init();
        });
    </script>
